<!--
@file index.html
@description Real-time kitchen monitor dashboard. Connects to the SSE stream
             and renders incoming orders as ticket cards. 80s arcade aesthetic.

@requires /orders/stream - SSE endpoint (backend/routes/orders.js)
@font     Press Start 2P - Google Fonts (loaded via CDN, no install needed)

@usedby server.js - Served as a static file via app.use('/dashboard', express.static(...))
@openin Browser   - http://localhost:3000/dashboard
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>🍕 Pizza Prince — Kitchen Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0a0a0f;
            color: #39ff14;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            min-height: 100vh;
            padding: 20px 20px 80px; /* bottom pad for clear-done bar */
        }

        /* ── Header ── */
        header {
            text-align: center;
            padding: 20px 0 30px;
            border-bottom: 2px solid #39ff14;
            margin-bottom: 30px;
            position: relative;
        }

        header h1 {
            font-size: 20px;
            color: #ff6b00;
            text-shadow: 0 0 20px #ff6b00;
            margin-bottom: 10px;
        }

        header p { color: #666; font-size: 8px; }

        /* Dev clear-all — invisible until hover, bottom-left */
        #dev-clear {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            color: #1a1a1a;
            background: transparent;
            border: 1px solid #1a1a1a;
            padding: 4px 6px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        #dev-clear:hover { color: #ff0040; border-color: #ff0040; }

        /* ── Prince widget — always in header top right ── */
        #prince-widget {
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #1a1a1a;
            padding: 10px 14px;
            transition: border-color 0.4s, box-shadow 0.4s;
        }
        #prince-widget.active {
            border-color: #ff6b00;
            box-shadow: 0 0 14px rgba(255,107,0,0.2);
        }

        .pw-icon {
            font-size: 18px;
            line-height: 1;
            opacity: 0.3;
            transition: opacity 0.4s;
        }
        #prince-widget.active .pw-icon { opacity: 1; }

        .pw-label {
            font-size: 7px;
            color: #333;
            letter-spacing: 2px;
            transition: color 0.4s;
            white-space: nowrap;
        }
        #prince-widget.active .pw-label { color: #ff6b00; }

        /* Waveform bars */
        .pw-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 22px;
        }
        .pw-bar {
            width: 3px;
            background: #222;
            border-radius: 2px;
            height: 3px;
            transition: background 0.4s;
        }

        /* Bars come alive when active */
        #prince-widget.active .pw-bar { background: #ff6b00; }
        #prince-widget.active .pw-bar:nth-child(1) { animation: bar 0.7s ease-in-out -0.3s infinite; }
        #prince-widget.active .pw-bar:nth-child(2) { animation: bar 0.5s ease-in-out -0.1s infinite; }
        #prince-widget.active .pw-bar:nth-child(3) { animation: bar 0.9s ease-in-out -0.5s infinite; }
        #prince-widget.active .pw-bar:nth-child(4) { animation: bar 0.6s ease-in-out -0.2s infinite; }
        #prince-widget.active .pw-bar:nth-child(5) { animation: bar 0.8s ease-in-out -0.4s infinite; }
        #prince-widget.active .pw-bar:nth-child(6) { animation: bar 0.5s ease-in-out  0.0s infinite; }
        #prince-widget.active .pw-bar:nth-child(7) { animation: bar 0.7s ease-in-out -0.6s infinite; }

        @keyframes bar {
            0%, 100% { height: 3px; }
            50%       { height: 20px; }
        }

        #header-timer {
            font-size: 8px;
            color: #ff6b00;
            letter-spacing: 2px;
            min-width: 32px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #prince-widget.active #header-timer { opacity: 1; }

        #listen-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            padding: 5px 9px;
            border: 1px solid #222;
            background: transparent;
            color: #333;
            cursor: not-allowed;
            letter-spacing: 1px;
            transition: border-color 0.4s, color 0.4s;
            position: relative;
            white-space: nowrap;
        }
        #prince-widget.active #listen-btn {
            border-color: #444;
            color: #555;
        }
        #listen-btn::after {
            content: 'COMING SOON';
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: #888;
            font-size: 6px;
            padding: 3px 6px;
            white-space: nowrap;
            display: none;
        }
        #listen-btn:hover::after { display: block; }

        /* ── Status ── */
        #status {
            text-align: center;
            margin-bottom: 20px;
            font-size: 8px;
        }
        #status.connected    { color: #39ff14; }
        #status.disconnected { color: #ff0040; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseDot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,0,0.7); }
            50%       { box-shadow: 0 0 0 6px rgba(255,107,0,0); }
        }

        .blink { animation: blink 1s step-end infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        /* ── Order Grid ── */
        #orders {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* ── Ticket base ── */
        .ticket {
            border: 2px solid #39ff14;
            padding: 16px;
            background: #0a0a0f;
            position: relative;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.4s ease-out;
            transition: border-color 0.3s, box-shadow 0.3s, opacity 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }

        /* ── State: NEW — red pulsing ── */
        .ticket[data-state="new"] {
            border-color: #ff0040;
            animation: slideIn 0.4s ease-out, pulseRed 0.9s ease-in-out 0.4s infinite;
        }
        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 15px #ff0040;        border-color: #ff0040; }
            50%       { box-shadow: 0 0 40px #ff0040, 0 0 60px rgba(255,0,64,0.4); border-color: #ff4060; }
        }

        /* ── State: IN PROGRESS — yellow solid glow ── */
        .ticket[data-state="in-progress"] {
            border-color: #ffcc00;
            box-shadow: 0 0 18px #ffcc00;
        }

        /* ── State: DONE — green, dimmed ── */
        .ticket[data-state="done"] {
            border-color: #39ff14;
            box-shadow: 0 0 10px rgba(57,255,20,0.3);
            opacity: 0.5;
        }

        /* ── Ticket sections ── */
        .ticket-id {
            position: absolute;
            top: 10px;
            right: 12px;
            color: #ff6b00;
            font-size: 8px;
        }

        .ticket-header {
            color: #fff;
            font-size: 11px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #333;
        }

        .order-type {
            display: inline-block;
            padding: 2px 6px;
            font-size: 7px;
            margin-left: 8px;
        }
        .order-type.delivery { background: #ff0040; color: #fff; }
        .order-type.pickup   { background: #0050ff; color: #fff; }

        .ticket-section { margin-bottom: 10px; }

        .label {
            color: #666;
            font-size: 7px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        /* Items — bigger and clearer */
        .ticket-items { padding-left: 0; list-style: none; }

        .ticket-items li {
            padding: 4px 0;
            border-bottom: 1px dotted #1a1a2e;
            font-size: 9px;
            line-height: 1.6;
        }

        .item-size {
            color: #ff6b00;
            font-size: 8px;
        }

        /* Modifications — bright and prominent so kitchen doesn't miss them */
        .item-mods {
            display: block;
            color: #ffcc00;
            font-size: 8px;
            margin-top: 2px;
            line-height: 1.6;
        }

        .ticket-total {
            color: #ff6b00;
            font-size: 12px;
            text-align: right;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #333;
        }

        /* ── Age timer ── */
        .ticket-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .ticket-time { color: #444; font-size: 7px; }

        .ticket-age {
            font-size: 8px;
            color: #39ff14;
            transition: color 0.5s;
        }
        .ticket-age.warn   { color: #ffcc00; }
        .ticket-age.urgent { color: #ff0040; }

        /* ── Action buttons ── */
        .ticket-actions {
            margin-top: 14px;
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 8px 4px;
            border: 2px solid;
            background: transparent;
            cursor: pointer;
            text-align: center;
            transition: background 0.15s, color 0.15s;
        }

        .btn-start {
            color: #ffcc00;
            border-color: #ffcc00;
        }
        .btn-start:hover { background: #ffcc00; color: #0a0a0f; }

        .btn-done {
            color: #39ff14;
            border-color: #39ff14;
        }
        .btn-done:hover { background: #39ff14; color: #0a0a0f; }

        /* hide buttons based on state */
        .ticket[data-state="new"]         .btn-done  { display: none; }
        .ticket[data-state="in-progress"] .btn-start { display: none; }
        .ticket[data-state="done"]        .ticket-actions { display: none; }

        /* ── Clear done bar ── */
        #clear-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0f;
            border-top: 2px solid #39ff14;
            padding: 14px 20px;
            display: none;
            justify-content: center;
        }
        #clear-bar.visible { display: flex; }

        #clear-done-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #39ff14;
            border: 2px solid #39ff14;
            background: transparent;
            padding: 10px 24px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        #clear-done-btn:hover { background: #39ff14; color: #0a0a0f; }

        /* ── Empty state ── */
        #empty {
            text-align: center;
            color: #333;
            padding: 60px 20px;
            font-size: 10px;
            line-height: 3;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍕 Pizza Prince</h1>
        <p>KITCHEN MONITOR - THE KING OF SLICES</p>

        <!-- Prince widget — always visible top right -->
        <div id="prince-widget">
            <span class="pw-icon">👑</span>
            <span class="pw-label">PRINCE</span>
            <div class="pw-bars">
                <div class="pw-bar"></div>
                <div class="pw-bar"></div>
                <div class="pw-bar"></div>
                <div class="pw-bar"></div>
                <div class="pw-bar"></div>
                <div class="pw-bar"></div>
                <div class="pw-bar"></div>
            </div>
            <span id="header-timer">0:00</span>
            <button id="listen-btn">🎧 LISTEN IN</button>
        </div>

        <button id="dev-clear" title="dev">✕ CLEAR ALL</button>
    </header>

    <div id="status" class="disconnected">
        <span class="blink">●</span> CONNECTING...
    </div>

    <div id="orders">
        <div id="empty">
            NO ORDERS YET<br/>
            WAITING FOR THE RUSH...
        </div>
    </div>

    <!-- Fixed bar that appears when orders are done -->
    <div id="clear-bar">
        <button id="clear-done-btn">CLEAR DONE ORDERS</button>
    </div>

    <script>

        // ── Audio beep (Web Audio API — no file needed) ──────────────────────────
        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                // Two short beeps
                [0, 0.22].forEach(delay => {
                    const osc  = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'square';
                    osc.frequency.value = 880;
                    gain.gain.setValueAtTime(0.25, ctx.currentTime + delay);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.18);
                    osc.start(ctx.currentTime + delay);
                    osc.stop(ctx.currentTime + delay + 0.18);
                });
            } catch(e) {}
        }

        // ── Age timer — updates every second ─────────────────────────────────────
        setInterval(() => {
            document.querySelectorAll('.ticket-age').forEach(el => {
                const arrived = parseInt(el.dataset.arrived);
                const elapsed = Math.floor((Date.now() - arrived) / 1000);
                const mins    = Math.floor(elapsed / 60);
                const secs    = elapsed % 60;
                el.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
                el.className = 'ticket-age' +
                    (mins >= 20 ? ' urgent' : mins >= 10 ? ' warn' : '');
            });
        }, 1000);

        // ── Prince widget ─────────────────────────────────────────────────────────
        const princeWidget  = document.getElementById('prince-widget');
        const headerTimerEl = document.getElementById('header-timer');
        let callTimerInterval = null;
        let callSeconds = 0;

        function startCallOverlay() {
            callSeconds = 0;
            headerTimerEl.textContent = '0:00';
            princeWidget.classList.add('active');
            callTimerInterval = setInterval(() => {
                callSeconds++;
                const m = Math.floor(callSeconds / 60);
                const s = callSeconds % 60;
                headerTimerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        function endCallOverlay() {
            clearInterval(callTimerInterval);
            princeWidget.classList.remove('active');
        }

        // ── Phone number formatter ────────────────────────────────────────────────
        function formatPhone(raw) {
            const d = (raw || '').replace(/\D/g, '');
            if (d.length === 10) return `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6)}`;
            if (d.length === 11) return `+${d[0]} ${d.slice(1,4)}-${d.slice(4,7)}-${d.slice(7)}`;
            return raw;
        }

        // ── SSE Connection ────────────────────────────────────────────────────────
        const source    = new EventSource('/orders/stream');
        const statusEl  = document.getElementById('status');
        const ordersEl  = document.getElementById('orders');
        const emptyEl   = document.getElementById('empty');
        const clearBar  = document.getElementById('clear-bar');

        source.onerror = () => {
            statusEl.className = 'disconnected';
            statusEl.innerHTML = '<span class="blink">●</span> RECONNECTING...';
        };

        // Track whether the initial history dump is done
        let historyLoaded = false;

        source.onopen = () => {
            statusEl.className = 'connected';
            statusEl.innerHTML = '<span class="blink">●</span> LIVE - WATCHING FOR ORDERS';
            // Mark history as loaded after a short delay —
            // the server flushes all existing orders immediately on connect
            setTimeout(() => { historyLoaded = true; }, 300);
        };

        source.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // Call state events
            if (data.type === 'call_started') { startCallOverlay(); return; }
            if (data.type === 'call_ended')   { endCallOverlay();   return; }

            // Orders from history (before historyLoaded) come in as done — no stale timers
            const isNew = historyLoaded;
            if (emptyEl) emptyEl.remove();
            addTicket(data, isNew);
            if (isNew) playBeep();
        };

        // ── Ticket builder ────────────────────────────────────────────────────────
        function addTicket(order, isNew = false) {
            const ticket = document.createElement('div');
            ticket.className = 'ticket';
            ticket.dataset.state = isNew ? 'new' : 'done';
            ticket.dataset.orderId = order.order_id;

            const arrived = order.timestamp ? new Date(order.timestamp).getTime() : Date.now();

            const time = new Date(arrived).toLocaleTimeString('en-US', {
                hour: 'numeric', minute: '2-digit', hour12: true
            });

            const itemsHtml = (order.items || []).map(item => {
                const size = item.size
                    ? `<span class="item-size"> — ${item.size}</span>`
                    : '';
                const qty  = item.quantity && item.quantity > 1 ? `${item.quantity}× ` : '';
                const mods = item.modifications?.length
                    ? `<span class="item-mods">⚠ ${item.modifications.join(', ')}</span>`
                    : '';
                return `<li>${qty}${item.name}${size}${mods}</li>`;
            }).join('');

            const type    = order.customer?.type?.toLowerCase() === 'delivery' ? 'delivery' : 'pickup';
            const address = type === 'delivery' && order.customer?.address
                ? `<div class="ticket-section">
                     <div class="label">ADDRESS</div>
                     <div>${order.customer.address}</div>
                   </div>`
                : '';

            ticket.innerHTML = `
                <div class="ticket-id">#${order.order_id}</div>
                <div class="ticket-header">
                    ${order.customer?.name || 'UNKNOWN'}
                    <span class="order-type ${type}">${type.toUpperCase()}</span>
                </div>

                <div class="ticket-section">
                    <div class="label">PHONE</div>
                    <div>${formatPhone(order.customer?.phone)}</div>
                </div>

                ${address}

                <div class="ticket-section items-section">
                    <div class="label">ORDER</div>
                    <ul class="ticket-items">${itemsHtml}</ul>
                </div>

                ${order.special_instructions
                    ? `<div class="ticket-section">
                         <div class="label">INSTRUCTIONS</div>
                         <div>${order.special_instructions}</div>
                       </div>`
                    : ''}

                <div class="ticket-total">TOTAL: $${Number(order.total_price).toFixed(2)}</div>

                <div class="ticket-meta">
                    <span class="ticket-time">${time}</span>
                    <span class="ticket-age" data-arrived="${arrived}">⏱ 0:00</span>
                </div>

                <div class="ticket-actions">
                    <button class="btn btn-start">▶ START</button>
                    <button class="btn btn-done">✓ DONE</button>
                </div>
            `;

            // ── Button handlers ──
            ticket.querySelector('.btn-start').addEventListener('click', () => {
                ticket.dataset.state = 'in-progress';
            });

            ticket.querySelector('.btn-done').addEventListener('click', () => {
                ticket.dataset.state = 'done';
                updateClearBar();
            });

            ordersEl.prepend(ticket);
        }

        // ── Clear done bar visibility ─────────────────────────────────────────────
        function updateClearBar() {
            const hasDone = document.querySelector('.ticket[data-state="done"]');
            clearBar.className = hasDone ? 'visible' : '';
        }

        document.getElementById('clear-done-btn').addEventListener('click', () => {
            document.querySelectorAll('.ticket[data-state="done"]').forEach(t => t.remove());
            updateClearBar();
            if (!document.querySelector('.ticket')) {
                ordersEl.innerHTML = '<div id="empty">NO ORDERS YET<br/>WAITING FOR THE RUSH...</div>';
            }
        });

        // ── Dev: clear all ────────────────────────────────────────────────────────
        document.getElementById('dev-clear').addEventListener('click', () => {
            document.querySelectorAll('.ticket').forEach(t => t.remove());
            clearBar.className = '';
            ordersEl.innerHTML = '<div id="empty">NO ORDERS YET<br/>WAITING FOR THE RUSH...</div>';
        });

    </script>
</body>
</html>
